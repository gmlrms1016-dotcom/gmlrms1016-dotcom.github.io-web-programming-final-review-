<!-- ===================================================================== -->
<!-- 전공 기말 완전정리 · 과목 선택 허브(index)                              -->
<!-- exam-summary 첫 화면: 전공 5과목을 버튼으로 선택                        -->
<!--  · 웹프로그래밍 기초  → 웹프로그래밍기초.html (기존, 완료)               -->
<!--  · 컴퓨터공학기초     → 컴퓨터공학기초.html (완료)                      -->
<!--  · 나머지 3과목       → alert(아직 안 만들었습니다)                     -->
<!-- ===================================================================== -->

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전공 기말 완전정리 · 과목 선택</title>
    <style>
        /* 색상 변수(웹프로그래밍 페이지와 동일한 초록 테마) */
        :root {
            --main: #2d6a4f;     /* 메인 초록 */
            --point: #d9772b;    /* 포인트 주황 */
            --bg: #f4f6f4;       /* 배경 */
            --card: #ffffff;     /* 카드 흰색 */
            --line: #d7ddd7;     /* 테두리 */
            --ink: #1d241e;      /* 글자색 */
            --muted: #9aa69c;    /* 흐린 글자(준비중) */
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "맑은 고딕", Arial, sans-serif;
            line-height: 1.7;
            color: var(--ink);
            background: var(--bg);
            padding: 24px;
        }
        .wrap { max-width: 960px; margin: 0 auto; }

        /* 머리말 */
        .page-head {
            background: var(--main);
            color: #fff;
            text-align: center;
            padding: 36px 20px;
            border-radius: 14px;
            margin-bottom: 24px;
        }
        .page-head h1 { font-size: 30px; }
        .page-head p { color: #d8efe2; margin-top: 6px; }

        /* 안내 팁 */
        .tip {
            background: #fff8e6;
            border-left: 5px solid var(--point);
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .tip b { color: var(--point); }

        /* 과목 버튼 격자 */
        .subjects {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2열 */
            gap: 16px;
        }

        /* 과목 버튼 공통(버튼/링크 둘 다 같은 모양) */
        .subject {
            display: block;
            width: 100%;
            text-align: left;
            text-decoration: none;
            font-family: inherit;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 22px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
        }
        .subject:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(45, 106, 79, 0.15);
            border-color: var(--main);
        }
        .subject .name {
            font-size: 20px;
            font-weight: 800;
            color: var(--main);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .subject .desc {
            font-size: 13px;
            color: #5b675d;
            margin-top: 8px;
        }

        /* 상태 배지 */
        .badge {
            font-size: 11px;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 50px;
            vertical-align: middle;
        }
        .badge.done { background: var(--main); color: #fff; }
        .badge.soon { background: #eceeec; color: var(--muted); }

        /* '준비중' 버튼은 흐리게 표시 */
        .subject.soon { background: #f7f8f7; }
        .subject.soon .name { color: var(--muted); }
        .subject.soon:hover {
            transform: none;
            box-shadow: none;
            border-color: var(--line);
            cursor: not-allowed;
        }

        /* 꼬리말 */
        footer {
            text-align: center;
            color: #7b857d;
            font-size: 13px;
            margin-top: 28px;
        }

        /* 작은 화면: 1열로 */
        @media screen and (max-width: 700px) {
            body { padding: 14px; }
            .subjects { grid-template-columns: 1fr; }
            .page-head h1 { font-size: 24px; }
        }
    </style>
</head>

<body>
<div class="wrap">

    <header class="page-head">
        <h1>📚 전공 기말 완전정리</h1>
        <p>동양미래대학교 · 2026년 1학기 — 아래에서 과목을 선택하세요</p>
    </header>

    <div class="tip">
        💡 <b>사용법</b> : 과목 버튼을 누르면 해당 과목 정리 페이지로 이동합니다.
        <b>완료</b> 표시 과목만 열람 가능하고, <b>준비중</b> 과목은 아직 정리 중입니다.
    </div>

    <div class="subjects">

        <!-- ① 웹프로그래밍 기초 (완료) → 웹프로그래밍기초.html 로 이동 -->
        <a class="subject" href="웹프로그래밍기초.html">
            <div class="name">웹프로그래밍 기초 <span class="badge done">완료</span></div>
            <div class="desc">1~13주차 HTML / CSS 완전정리 + 퀴즈 (JavaScript 제외)</div>
        </a>

        <!-- ② 컴퓨터공학기초 (완료) → 새로 만든 컴퓨터공학기초.html 로 이동 -->
        <a class="subject" href="컴퓨터공학기초.html">
            <div class="name">컴퓨터공학기초 <span class="badge done">완료</span></div>
            <div class="desc">기말 시험범위 — 6장 인공지능·딥러닝 / 7장 컴퓨팅 사고력 / 9장 데이터베이스 / 10장 네트워크</div>
        </a>

        <!-- ③ SW개발도구활용 (준비중) → 클릭 시 alert, 이동 없음 -->
        <button class="subject soon" type="button"
                onclick="alert('아직 안 만들었습니다. 곧 추가될 예정이에요!')">
            <div class="name">SW개발도구활용 <span class="badge soon">준비중</span></div>
            <div class="desc">아직 정리하지 않은 과목입니다.</div>
        </button>

        <!-- ④ 프로그래밍방법론 (준비중) -->
        <button class="subject soon" type="button"
                onclick="alert('아직 안 만들었습니다. 곧 추가될 예정이에요!')">
            <div class="name">프로그래밍방법론 <span class="badge soon">준비중</span></div>
            <div class="desc">아직 정리하지 않은 과목입니다.</div>
        </button>

        <!-- ⑤ 파이썬프로그래밍 (준비중) -->
        <button class="subject soon" type="button"
                onclick="alert('아직 안 만들었습니다. 곧 추가될 예정이에요!')">
            <div class="name">파이썬프로그래밍 <span class="badge soon">준비중</span></div>
            <div class="desc">아직 정리하지 않은 과목입니다.</div>
        </button>

    </div>

    <footer>© 2026 윤희근 · 전공 기말 정리 모음</footer>

</div>
</body>
</html>
